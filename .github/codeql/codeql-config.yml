name: "quackback CodeQL config"

# Keep repository source fully scanned. The JavaScript suppression query lets
# the existing source-level codeql[js/insufficient-password-hash] annotation
# suppress only the verified false positive without excluding the rest of the
# file from future CodeQL coverage.
queries:
  - uses: security-extended

packs:
  javascript:
    - codeql/javascript-queries:AlertSuppression.ql
